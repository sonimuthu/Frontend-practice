<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Header Layout</title>
    <style>
        .header-box{
            display: flex;
            align-items: center;
            justify-content:space-between;
            border: 2px solid black;
        }

        .logo{
            width: 200px;
            height: 90px;
        }

        .center h1{
            margin: 0;
            text-decoration:double;
        }

        .right{
            display:flex;
            gap:10px;
            justify-content: flex-end;
             
        }
        h4{
             border: 2px solid black;
        }
        h4:hover{
           background-color:aquamarine;
        }
        
     .box {
            margin-top: 40px;
  width: 300px;
  height: 400px;

  display: flex;              /* side by side */
  justify-content: space-around;
  align-items: flex-start;
  padding: 20px;
  gap: 20px;
        }
     .item {
   text-align: center;
   border: 2px solid black;
   padding: 20px;
}

.item img {
  width: 250px;
  height: 230px ;
   border: 2px solid black;
}
    </style>
</head>
<body>

<div class="header-box">
    <div class="left">
        <img src="download.png" class="logo">
    </div>

    <div class="center">
        <h1>Welcome to the Website</h1>
    </div>

    <div class="right">
        <h4>Menu</h4>
        <h4>About</h4>
        <h4>Setting</h4>
    </div>
</div>
<br>
<div class="box">
    <div class="item">
    <img src="bag.jpg">
    <h3>Bag</h3>
    <h3>Cost:700</h3>
    </div>
    
    <div class="item">
    <img src="cake.jpg">
    <h3>Bag</h3>
    <h3>Cost:700</h3>
    </div>

    <div class="item">
    <img src="shoe.jpg">
    <h3>Bag</h3>
    <h3>Cost:700</h3>
    </div>

    <div class="item">
    <img src="stationery.jpg">
    <h3>Bag</h3>
    <h3>Cost:700</h3>
    </div>

    <div class="item">
    <img src="watch.jpg">
    <h3>Bag</h3>
    <h3>Cost:700</h3>
    </div>
    <div class="item">
    <img src="waterbottle.jpg">
    <h3>Bag</h3>
    <h3>Cost:700</h3>
    </div>

</div>

</body>
</html>
