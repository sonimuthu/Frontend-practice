<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body{
            margin: 0;
            font-family: arial,sans-serif;
        }
        .one{
            background-color: #34eb77;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
       .logo h1{
        margin: 0;
       }
       ul{
        list-style:none;
        display: flex;
        gap: 20px;
        margin: 0;
       }
       li{
        font-size: 20px;
       }
       #menu-toggle{
        display:none;
       }
       .menu-icon{
        display:none;
        font-size: 30px;
        cursor: pointer;
       }
       @media(max-width:600px){
        .menu-icon{
            display: block;
        }
       ul{
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 70px;
        left:0;
        width: 100%;
        background-color:white;
        text-align: center;
        padding:10px 0;
       }
       #menu-toggle:checked~ul{
        display: flex;
       }
    }
    
    </style>
<div class="one">
    <div class="logo">
        <h1>Header</h1>
    </div>
    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-icon">&#8942;</label>
    <ul>
        <li>Home</li>
        <li>About</li>
        <li>Services</li>
        <li>Contact</li>
    </ul>
</div>
</body>
</html>
